experiment:
  name: qwen3_vl_arrow_sft_full_ft_rtx6000_96g
  output_dir: outputs/qwen3_vl_arrow_sft_full_ft_rtx6000_96g
  seed: 42

model:
  # 单卡 RTX Pro 6000 96GB：更保守的 full FT 模板。
  # full FT 依然明显比 LoRA 更吃显存；这里默认冻结视觉塔，先优先保证可跑。
  model_name_or_path: models/Qwen3-VL-2B-Instruct
  remote_model_name_or_path: Qwen/Qwen3-VL-2B-Instruct
  trust_remote_code: true
  attn_implementation: flash_attention_2
  freeze_vision_tower: true
  vision_name_substrings:
    - visual
  projector_name_substrings:
    - merger
    - projector
    - multi_modal_projector
  min_pixels: 200704
  # 1024 x 1024 total pixel budget: 1,048,576
  max_pixels: 1048576

tokenizer:
  # 坐标离散为 1000 档，对应 <|x_0000|> ~ <|x_0999|> / <|y_0000|> ~ <|y_0999|>
  num_bins: 1000
  add_eos_token: true

prompt:
  system_prompt: |
    <|arrow_task|>
    Output all arrows in the predefined format.

data:
  train_path: data/processed/normalized/train.jsonl
  val_path: data/processed/normalized/val.jsonl
  shuffle_instances_for_training: true
  num_workers: 6
  pin_memory: true
  persistent_workers: true

finetune:
  mode: full

train:
  epochs: 3
  per_device_batch_size: 1
  grad_accum_steps: 8
  learning_rate: 0.00001
  embed_learning_rate: 0.00001
  lm_head_learning_rate: 0.00001
  weight_decay: 0.01
  warmup_ratio: 0.03
  scheduler_type: cosine
  max_grad_norm: 1.0
  bf16: true
  eval_strategy: epoch
  eval_start_epoch: 1
  log_every_steps: 10
  eval_every_steps: 400
  save_every_steps: 400
  save_step_checkpoints: false
  keep_last_n_checkpoints: 3
  find_unused_parameters: false

eval:
  # 训练期评估先收紧到 512，避免模型早期无法闭合协议时把生成打满上限。
  # 最终离线评估或部署再单独放宽。
  max_new_tokens: 512
  num_beams: 1
  do_sample: false
  use_cache: true
  bbox_iou_threshold: 0.5
  strict_point_distance_px: 8.0
  monitor_metric: val/end_to_end_score
  monitor_mode: max

logging:
  use_wandb: true
  project: vlm_det
  run_name: qwen3_vl_arrow_sft_full_ft_rtx6000_96g
  progress_ncols: 88

checkpoint:
  resume_from: null
