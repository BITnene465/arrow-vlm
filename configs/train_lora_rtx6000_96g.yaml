experiment:
  name: qwen3_vl_arrow_sft_lora_rtx6000_96g
  output_dir: outputs/qwen3_vl_arrow_sft_lora_rtx6000_96g
  seed: 42

model:
  # 单卡 RTX Pro 6000 96GB：更保守的 LoRA 模板，优先保证稳定训练。
  # 如果显存仍然紧张，先从 LoRA 路线跑通，再考虑逐步放宽配置。
  model_name_or_path: models/Qwen3-VL-2B-Instruct
  remote_model_name_or_path: Qwen/Qwen3-VL-2B-Instruct
  trust_remote_code: true
  attn_implementation: flash_attention_2
  freeze_vision_tower: true
  train_projector: false
  vision_name_substrings:
    - visual
  projector_name_substrings:
    - merger
    - projector
    - multi_modal_projector
  min_pixels: 200704
  # 2K UHD total pixel budget: 2560 x 1440 = 3,686,400
  max_pixels: 3686400

tokenizer:
  num_bins: 2048
  add_eos_token: true

prompt:
  system_prompt: |
    <|arrow_task|>
    Detect all arrows in the figure and output each arrow using the predefined structured format. For each arrow, output one bounding box and an ordered keypoint sequence. The first keypoint is the start point, the last keypoint is the arrow head, and intermediate keypoints are turning points. Use <|visible|> for visible keypoints and <|occluded|> for occluded keypoints.

data:
  train_path: data/processed/normalized/train.jsonl
  val_path: data/processed/normalized/val.jsonl
  shuffle_instances_for_training: true
  num_workers: 6
  pin_memory: true
  persistent_workers: true

finetune:
  mode: lora

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

train:
  epochs: 4
  per_device_batch_size: 1
  grad_accum_steps: 8
  learning_rate: 0.00008
  embed_learning_rate: 0.00008
  lm_head_learning_rate: 0.00006
  lora_learning_rate: 0.00012
  weight_decay: 0.01
  warmup_ratio: 0.03
  scheduler_type: cosine
  max_grad_norm: 1.0
  bf16: true
  log_every_steps: 10
  eval_every_steps: 400
  save_every_steps: 400
  save_step_checkpoints: false
  keep_last_n_checkpoints: 3
  find_unused_parameters: false

eval:
  # 训练中评估先收紧到 4096，减少验证阶段显存压力。
  # 如果后续确认需要更长输出，再单独放宽。
  max_new_tokens: 4096
  num_beams: 1
  do_sample: false
  use_cache: true
  bbox_iou_threshold: 0.5
  strict_point_distance_px: 8.0
  monitor_metric: val/end_to_end_score
  monitor_mode: max

logging:
  use_wandb: true
  project: vlm_det
  run_name: qwen3_vl_arrow_sft_lora_rtx6000_96g
  progress_ncols: 88

checkpoint:
  resume_from: null
