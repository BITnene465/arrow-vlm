experiment:
  name: qwen3_vl_sync_posttrain_ft
  output_dir: outputs/qwen3_vl_sync_posttrain_ft
  seed: 42

model:
  model_name_or_path: models/Qwen3-VL-2B-Instruct
  remote_model_name_or_path: Qwen/Qwen3-VL-2B-Instruct
  trust_remote_code: true
  attn_implementation: flash_attention_2
  freeze_vision_tower: false
  vision_name_substrings:
    - visual
  projector_name_substrings:
    - merger
    - projector
    - multi_modal_projector
  min_pixels: 200704
  # 1024 x 1024 total pixel budget: 1,048,576
  max_pixels: 1048576

tokenizer:
  # 坐标离散为 1000 档，对应 <|x_0000|> ~ <|x_0999|> / <|y_0000|> ~ <|y_0999|>
  num_bins: 1000
  add_eos_token: true

prompt:
  system_prompt: ""
  user_prompt: |
    <|arrow_task|>
    Output only protocol tokens, with no extra text.

    Use this format:
    <|arrows_begin|>
    repeat:
      <|arrow_begin|>
      <|box_begin|> x y x y <|box_end|>
      <|points_begin|>
      repeat:
        <|point_begin|> x y <|visible|>/<|occluded|> <|point_end|>
      <|points_end|>
      <|arrow_end|>
    <|arrows_end|>

    Each arrow must contain at least 2 points.
    Keypoints must be ordered from tail to head.

data:
  train_path: data/sync/train.jsonl
  val_path: data/sync/val.jsonl
  shuffle_instances_for_training: true
  num_workers: 6
  pin_memory: true
  persistent_workers: true

finetune:
  mode: full

train:
  epochs: 2
  per_device_batch_size: 1
  grad_accum_steps: 8
  learning_rate: 0.00001
  embed_learning_rate: 0.00001
  lm_head_learning_rate: 0.00001
  weight_decay: 0.01
  warmup_ratio: 0.03
  scheduler_type: cosine
  max_grad_norm: 1.0
  bf16: true
  eval_strategy: epoch
  eval_start_epoch: 1
  log_every_steps: 10
  eval_every_steps: 1000
  save_every_steps: 1000
  save_step_checkpoints: false
  keep_last_n_checkpoints: 3
  find_unused_parameters: false

eval:
  per_device_batch_size: 4
  # synthetic post-training 使用更长的输出上限，以覆盖多实例与长路径样本
  max_new_tokens: 2048
  num_beams: 1
  do_sample: false
  use_cache: true
  bbox_iou_threshold: 0.5
  strict_point_distance_px: 8.0
  monitor_metric: val/end_to_end_score
  monitor_mode: max

logging:
  use_wandb: true
  project: vlm_det
  run_name: qwen3_vl_sync_posttrain_ft
  progress_ncols: 88

checkpoint:
  resume_from: null
