seed: 42
output_dir: data/sync
workers: 20

train_samples: 20000
val_samples: 200

renderer:
  name: procedural
  hybrid:
    use_real_background_probability: 1.0
    context_patch_probability: 0.8
    context_patches_range: [1, 4]
    arrow_patch_probability: 0.42
    arrow_patches_range: [0, 2]
    arrow_patch_scale_range: [0.7, 1.15]
    arrow_patch_placement_retry: 28
    arrow_patch_max_iou: 0.08
    draw_procedural_distractors_probability: 0.25
    procedural_distractor_scale: 0.45
    degradation_scale: 0.6

assets:
  processed_jsonl_paths:
    - data/processed/train.jsonl
    - data/processed/val.jsonl
  max_records: null
  background_min_crop_ratio: 0.35
  background_retry: 24
  negative_crop_retry: 20
  instance_exclusion_margin_ratio: 0.12
  context_patch_size_range: [96, 320]
  arrow_patch_retry: 24
  arrow_patch_pad_ratio_range: [0.12, 0.34]
  arrow_patch_min_context_px: 12
  arrow_patch_max_instances_per_crop: 4

debug:
  save_visualizations: false
  max_saved_samples_per_split: 20

resolution_buckets:
  - min_width: 320
    max_width: 512
    min_height: 320
    max_height: 512
    weight: 0.2
  - min_width: 512
    max_width: 768
    min_height: 384
    max_height: 768
    weight: 0.35
  - min_width: 768
    max_width: 960
    min_height: 512
    max_height: 960
    weight: 0.3
  - min_width: 960
    max_width: 1024
    min_height: 640
    max_height: 1024
    weight: 0.15

arrow_count_bins:
  - min: 1
    max: 4
    weight: 0.38
  - min: 5
    max: 10
    weight: 0.38
  - min: 11
    max: 18
    weight: 0.18
  - min: 19
    max: 30
    weight: 0.06

arrow_label_weights:
  single_arrow: 0.82
  double_arrow: 0.18

scene_modes:
  - name: normal
    weight: 0.62
  - name: sparse_large
    weight: 0.1
  - name: single_hero
    weight: 0.05
  - name: single_crop
    weight: 0.23

arrow_size_modes:
  - name: small
    min_length_ratio: 0.05
    max_length_ratio: 0.16
    weight: 0.28
  - name: medium
    min_length_ratio: 0.12
    max_length_ratio: 0.30
    weight: 0.42
  - name: large
    min_length_ratio: 0.24
    max_length_ratio: 0.55
    weight: 0.22
  - name: hero
    min_length_ratio: 0.45
    max_length_ratio: 0.88
    weight: 0.08

layout:
  max_instance_iou: 0.18
  max_generation_retries_per_arrow: 60
  edge_margin_ratio: 0.04
  min_arrow_length_ratio: 0.08
  max_arrow_length_ratio: 0.35
  primary_axis_aligned_probability: 0.58
  orthogonal_angle_jitter_deg: 10

style:
  background_modes:
    plain_white: 0.45
    paper: 0.35
    gray: 0.2
  distractor_line_width_range: [1, 3]
  distractor_lines_range: [2, 18]
  distractor_boxes_range: [0, 10]
  text_like_strokes_range: [0, 12]
  occluder_count_range: [0, 8]
  blur_probability: 0.25
  blur_radius_range: [0.4, 1.2]
  jpeg_quality_range: [70, 95]
  noise_probability: 0.35
  noise_stddev_range: [2.0, 10.0]
