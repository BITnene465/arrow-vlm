seed: 42
output_dir: data/sync

train_samples: 10000
val_samples: 200

resolution_buckets:
  - min_width: 320
    max_width: 512
    min_height: 320
    max_height: 512
    weight: 0.2
  - min_width: 512
    max_width: 768
    min_height: 384
    max_height: 768
    weight: 0.35
  - min_width: 768
    max_width: 960
    min_height: 512
    max_height: 960
    weight: 0.3
  - min_width: 960
    max_width: 1024
    min_height: 640
    max_height: 1024
    weight: 0.15

arrow_count_bins:
  - min: 1
    max: 8
    weight: 0.35
  - min: 9
    max: 20
    weight: 0.4
  - min: 21
    max: 40
    weight: 0.2
  - min: 41
    max: 80
    weight: 0.05

point_count_bins:
  - count: 2
    weight: 0.45
  - count: 3
    weight: 0.3
  - count: 4
    weight: 0.15
  - count: 5
    weight: 0.07
  - count: 6
    weight: 0.03

layout:
  max_instance_iou: 0.18
  max_generation_retries_per_arrow: 60
  edge_margin_ratio: 0.04
  min_arrow_length_ratio: 0.08
  max_arrow_length_ratio: 0.35
  turn_angle_jitter_deg: 45

style:
  background_modes:
    plain_white: 0.45
    paper: 0.35
    gray: 0.2
  line_width_range: [1, 4]
  arrow_head_length_range: [10, 24]
  arrow_head_width_range: [6, 18]
  distractor_lines_range: [2, 18]
  distractor_boxes_range: [0, 10]
  text_like_strokes_range: [0, 12]
  occluder_count_range: [0, 8]
  occluded_point_probability: 0.12
  blur_probability: 0.25
  blur_radius_range: [0.4, 1.2]
  jpeg_quality_range: [70, 95]
  noise_probability: 0.35
  noise_stddev_range: [2.0, 10.0]
